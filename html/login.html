<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8">
      <title>Login</title>
      <link rel="stylesheet" href="../css/login.css">
	  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
   </head>
   <body>
      <div class="wrapper">
		<div id="front">
			<div class="title">
			   Login Form
			</div>
			<form id="LoginForm">
			   <div class="field">
				  <input type="text" name="username" required>
				  <label>Username</label>
			   </div>
			   <div class="field">
				  <input type="password" name="password" required>
				  <label>Password</label>
			   </div>
			   <div class="field">
				  <input type="submit" value="Login">
			   </div>
			   <div class="signup-link">
				  Not a member? <a id="SignupText">Signup now</a>
			   </div>
			</form>
		</div>
		<div id="back">
			<div class="title">
			   Signup Form
			</div>
			<form id="SignupForm">
				<input type="file" name="pfp" id="pfp" onchange="changeImage(event)">
				<label for="pfp" id="pfplabel">
					<div><i class="fa-solid fa-pen"></i></div>
				</label>
			   <div class="field">
				  <input type="text" name="username" required>
				  <label>Username</label>
			   </div>
			   <div class="field">
				  <input type="password" name="password1" required>
				  <label>Password</label>
			   </div>
			   <div class="field">
				   <input type="password" name="password2" required>
				   <label>Confirm password</label>
				</div>
			   <div class="field">
				  <input type="submit" value="Signup">
			   </div>
			   <div class="signup-link">
				  Already have an account? <a id="LoginText">Login</a>
			   </div>
			</form>
		</div>
      </div>
	  <script type="module" src="../js/login.js"></script>
   </body>
</html>
